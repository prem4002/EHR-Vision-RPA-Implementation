<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dummy EHR Intake Form</title>
<style>
  body { font-family: Arial, sans-serif; background: #f4f6f8; padding: 40px; }
  .form-box { background: #fff; max-width: 480px; margin: auto; padding: 30px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.15); }
  h2 { margin-top: 0; }
  label { display: block; margin-top: 16px; font-weight: bold; font-size: 14px; }
  input, select { width: 100%; padding: 8px; margin-top: 4px; font-size: 14px; box-sizing: border-box; }
  button { margin-top: 24px; padding: 10px 20px; background: #2563eb; color: #fff; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; }
</style>
</head>
<body>
  <div class="form-box">
    <h2>Patient Demographics</h2>

    <label for="patient_name">Patient Name</label>
    <input type="text" id="patient_name" name="patient_name">

    <label for="dob">Date of Birth</label>
    <input type="text" id="dob" name="dob" placeholder="MM/DD/YYYY">

    <label for="sex">Sex</label>
    <select id="sex" name="sex">
      <option value="">-- Select --</option>
      <option value="M">Male</option>
      <option value="F">Female</option>
      <option value="O">Other</option>
    </select>

    <label for="insurance_id">Insurance ID</label>
    <input type="text" id="insurance_id" name="insurance_id">

    <label for="address">Address</label>
    <input type="text" id="address" name="address">

    <label for="phone">Phone Number</label>
    <input type="text" id="phone" name="phone">

    <button id="save_btn" type="button">Save</button>
  </div>
</body>
</html>
